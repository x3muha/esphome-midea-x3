esphome:
  name: klima-test
  friendly_name: Klima Test
  comment: "Midea X3: UART + demodulated TSOP injection"
  on_boot:
    priority: -100
    then:
      - lambda: |-
          id(midea_ac).set_clean_restore(id(midea_clean_restore_switch).state);
          if (id(midea_clean_duration_minutes).has_state()) {
            id(midea_ac).set_clean_duration(
                static_cast<uint32_t>(id(midea_clean_duration_minutes).state * 60000.0f));
          }

esp32:
  board: esp32dev
  framework:
    type: arduino

external_components:
  - source: github://x3muha/esphome-midea-x3@main
    components: [midea]
    refresh: 0s

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  manual_ip:
    static_ip: 10.77.77.20
    gateway: 10.0.0.1
    subnet: 255.0.0.0
    dns1: 10.0.0.2

  ap:
    ssid: Klima-Test-Fallback
    password: !secret wifi_hotspot_password

captive_portal:

logger:
  baud_rate: 115200
  level: DEBUG

api:

ota:
  - platform: esphome

web_server:
  port: 80

uart:
  id: ac_uart
  tx_pin: GPIO16
  rx_pin: GPIO17
  baud_rate: 9600

# GPIO14 is connected to the indoor unit TSOP OUT signal line, not to a separate IR receiver.
# Keep raw enabled so injected and remote-control pulses can be compared in logs.
remote_receiver:
  id: ir_rx
  pin:
    number: GPIO14
    inverted: true
    mode:
      input: true
      pullup: false
  dump: raw
  tolerance: 50%
  idle: 25ms
  filter: 20us
  buffer_size: 4096

# GPIO13 drives the 2N7000 gate for demodulated TSOP-line injection.
# This is not an IR LED sender. Do not set carrier_frequency in actions.
remote_transmitter:
  id: ir_tx
  pin: GPIO13
  carrier_duty_percent: 100%
  non_blocking: true
  rmt_symbols: 192

climate:
  - platform: midea
    id: midea_ac
    name: "Klimaanlage"
    uart_id: ac_uart
    transmitter_id: ir_tx
    autoconf: true
    beeper: true
    period: 1s
    timeout: 2s
    num_attempts: 3
    clean_restore: true
    clean_duration: 120min
    supported_modes:
      - HEAT_COOL
      - COOL
      - HEAT
      - DRY
      - FAN_ONLY
    supported_presets:
      - BOOST
      - ECO
    supported_swing_modes:
      - VERTICAL
      - HORIZONTAL
      - BOTH
    custom_presets:
      - FREEZE_PROTECTION
    custom_fan_modes:
      - SILENT
      - TURBO
    visual:
      min_temperature: 16°C
      max_temperature: 30°C
      temperature_step: 0.5°C
    fresh_state:
      id: midea_fresh_state
      name: "Midea Fresh Status"
      internal: true
    clean_running:
      id: midea_clean_running
      name: "Midea Clean Running"
      internal: true
    clean_state:
      id: midea_clean_state
      name: "Midea Clean State"
    clean_remaining:
      id: midea_clean_remaining
      name: "Midea Clean Remaining"
    last_control_source:
      id: midea_last_control_source
      name: "Midea Last Control Source"

sensor:
  - platform: wifi_signal
    name: "Klima WiFi Signal"
    update_interval: 60s

  - platform: uptime
    name: "Klima Uptime"

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "Klima IP"

number:
  - platform: template
    name: "Midea Clean Dauer"
    id: midea_clean_duration_minutes
    icon: mdi:timer-cog-outline
    unit_of_measurement: min
    min_value: 15
    max_value: 240
    step: 5
    optimistic: true
    restore_value: true
    initial_value: 120
    set_action:
      - lambda: |-
          id(midea_ac).set_clean_duration(static_cast<uint32_t>(x * 60000.0f));

switch:
  - platform: template
    name: "Midea Clean Restore"
    id: midea_clean_restore_switch
    icon: mdi:backup-restore
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    turn_on_action:
      - lambda: |-
          id(midea_ac).set_clean_restore(true);
    turn_off_action:
      - lambda: |-
          id(midea_ac).set_clean_restore(false);

  - platform: template
    name: "Midea Fresh"
    id: midea_fresh_switch
    icon: mdi:air-filter
    lambda: |-
      if (id(midea_fresh_state).has_state()) {
        return id(midea_fresh_state).state;
      }
      return {};
    turn_on_action:
      - midea_ac.fresh_on:
          id: midea_ac
    turn_off_action:
      - midea_ac.fresh_off:
          id: midea_ac

  - platform: template
    name: "Midea Clean"
    id: midea_clean_switch
    icon: mdi:spray-bottle
    lambda: |-
      if (id(midea_clean_running).has_state()) {
        return id(midea_clean_running).state;
      }
      return {};
    turn_on_action:
      - midea_ac.clean_on:
          id: midea_ac
    turn_off_action:
      - midea_ac.clean_off:
          id: midea_ac

button:
  - platform: template
    name: "Midea Power Toggle"
    icon: mdi:power
    on_press:
      - midea_ac.power_toggle:
          id: midea_ac

  - platform: template
    name: "Midea Display Toggle"
    icon: mdi:theme-light-dark
    on_press:
      - midea_ac.display_toggle:
          id: midea_ac

  - platform: template
    name: "Midea Swing Step"
    icon: mdi:tailwind
    on_press:
      - midea_ac.swing_step:
          id: midea_ac

  - platform: template
    name: "Midea Clean Reset"
    icon: mdi:restart
    on_press:
      - midea_ac.clean_reset:
          id: midea_ac

  - platform: template
    name: "Midea Follow Me 24C Test"
    icon: mdi:thermometer
    on_press:
      - midea_ac.follow_me:
          id: midea_ac
          temperature: 24
          use_fahrenheit: false
          beeper: false
